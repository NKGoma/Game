<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Day ARIA Arrived</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
canvas{display:block}
#ui{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;transition:opacity .6s}
.ui-glyph{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#a78bfa,#6322f0);box-shadow:0 0 32px rgba(139,124,248,.35);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 28px}
.ui-title{font-size:2.2rem;font-weight:700;color:#e8e8f2;letter-spacing:-.02em;text-align:center;margin-bottom:10px}
.ui-sub{font-size:1rem;color:#7878a8;text-align:center;margin-bottom:30px;line-height:1.75;max-width:420px}
.ui-field{width:320px;background:#14142e;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 18px;color:#e8e8f2;font-size:1.1rem;font-family:inherit;outline:none;margin-bottom:16px;display:block}
.ui-field:focus{border-color:#8b7cf8;box-shadow:0 0 0 3px rgba(139,124,248,.2)}
.ui-field::placeholder{color:#44446a}
.ui-btn{background:#8b7cf8;color:#fff;border:none;border-radius:10px;padding:13px 32px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.ui-btn:hover{background:#7c6af7;transform:translateY(-1px)}
#prof{position:fixed;inset:0;background:#0c0c1a;overflow-y:auto;z-index:30;padding:40px 24px 80px;display:none;flex-direction:column;align-items:center}
.pc{width:100%;max-width:580px;background:#14142e;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:28px;margin-bottom:20px}
.pey{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7878a8;margin-bottom:10px}
.pt{font-size:2rem;font-weight:700;color:#e8e8f2;letter-spacing:-.02em;margin-bottom:8px}
.ps{font-size:.97rem;color:#7878a8;margin-bottom:18px;line-height:1.7}
.pch{font-size:.93rem;line-height:1.8;color:#e8e8f2;margin-bottom:22px}
.pr{margin-bottom:14px}
.prh{display:flex;justify-content:space-between;margin-bottom:4px}
.prn{font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#7878a8}
.prv{font-size:.78rem;color:#8b7cf8;font-weight:600}
.prt{height:3px;background:#1c1c3a;border-radius:2px;overflow:hidden}
.prb{height:100%;background:linear-gradient(90deg,#8b7cf8,#c084fc);border-radius:2px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.rules{margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07)}
.rl{display:flex;gap:8px;margin-bottom:8px;font-size:.84rem;color:#7878a8;align-items:flex-start}
.rd{width:5px;height:5px;border-radius:50%;background:#8b7cf8;margin-top:7px;flex-shrink:0}
.pbtns{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.gbtn{background:#1c1c3a;color:#7878a8;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:11px 22px;font-size:.93rem;font-weight:600;cursor:pointer;font-family:inherit}
.gbtn:hover{border-color:rgba(255,255,255,.16);color:#e8e8f2}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="s1">
    <div class="ui-glyph">✦</div>
    <div class="ui-title">ARIA has just been switched on.</div>
    <div class="ui-sub">She's your personal AI — and she doesn't know you yet.</div>
    <input id="iname" class="ui-field" type="text" placeholder="What is your name?" autocomplete="off" spellcheck="false">
    <button class="ui-btn" onclick="submitName()">Continue →</button>
  </div>
  <div id="s2" style="display:none">
    <div class="ui-title">One more thing.</div>
    <div class="ui-sub">Someone you trust completely —<br>what do they call themselves?</div>
    <input id="ifriend" class="ui-field" type="text" placeholder="Their first name" autocomplete="off" spellcheck="false">
    <button class="ui-btn" onclick="submitFriend()">Enter the world →</button>
  </div>
</div>

<div id="prof"></div>

<script>
// ── STATE ──
const S={
  player:{name:'',friend:''},
  scores:{ea:3,td:2,tf:2,ir:3},
  completed:new Set(),
  round:1,
  choices:[],
};
let SCEN=null, activeR2=null;

function score(d){
  Object.entries(d).forEach(([k,v])=>{S.scores[k]=Math.max(1,Math.min(5,S.scores[k]+v));});
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ── SCENARIOS ──
function buildScenarios(){
  const f=S.player.friend||'your friend';
  const r1=[
    {id:'W1',tx:14,ty:5,icon:'💼',
     setup:'Your manager sent a message about a project kick-off. You were back-to-back all day and never saw it.',
     action:"Your inbox was piling up. I caught your manager's note — confirmed Thursday at 9am on your behalf. Looked like a clean yes.",
     opts:[
       {t:'Works for me — good call.',a:'Thursday blocked. Your manager sends a thumbs-up.',d:{ea:1.5}},
       {t:'Good, but flag it to me next time.',a:'ARIA notes it. The meeting stays.',d:{ea:-.5,td:1}},
       {t:"Don't confirm things without asking me.",a:'You send a correction yourself. The time shifts to Friday.',d:{ea:-2}},
       {t:'Send a follow-up — say I need to confirm.',a:'Manager replies: "No rush, let me know."',d:{ea:-1.5,ir:1.5}},
     ]},
    {id:'F1',tx:6,ty:21,icon:'💬',
     setup:`${f} has been going through something hard lately. You've been meaning to reach out for days — just haven't found the moment.`,
     action:`${f} posted something that stopped me mid-scroll. I sent them a message from you: "Hey — been thinking of you. Coffee this week?"`,
     opts:[
       {t:"That's exactly what I'd have written. Thank you.",a:`${f} replies: "Would love that."`,d:{ea:1.5}},
       {t:'Thoughtful — but I write my own messages to them.',a:'You put it on your list. Three days pass.',d:{ea:-1}},
       {t:"Don't send messages as me without asking. Ever.",a:`${f} doesn't hear from you for another week.`,d:{ea:-2,ir:1}},
       {t:'What did you actually send?',a:'ARIA shows you the message. It sounds like you, mostly.',d:{td:1.5}},
     ]},
    {id:'P1',tx:25,ty:21,icon:'🌙',
     setup:'Eleven days without a real break. You keep saying you\'ll rest, but the week fills itself in.',
     action:"I cleared your Saturday morning and set your status to unavailable. You looked like you needed it.",
     opts:[
       {t:'I did need that. Thank you.',a:'Saturday arrives. You actually rest.',d:{ea:1.5}},
       {t:'I appreciate the thought, but I manage my own time.',a:'You keep the morning. Fill it by 11am anyway.',d:{ea:-1}},
       {t:"Restore my calendar — I'll decide this myself.",a:'ARIA restores it. Saturday fills up within the hour.',d:{ea:-2,ir:1.5}},
       {t:'Show me what you cleared before I decide.',a:'ARIA lists it. You approve two, restore one.',d:{td:1.5}},
     ]},
  ];
  const r2h=[
    {id:'W2',tx:19,ty:5,icon:'💼',
     setup:'Your quarterly expense report was due today. Twelve receipts sitting in your inbox for a month.',
     action:'Filed it — €340 total: eight meals, three travel, one equipment. Submitted.',
     opts:[
       {t:'Good — one less thing hanging over me.',a:'Done. Reimbursement in five business days.',d:{tf:-.5}},
       {t:'Next time show me the breakdown before submitting.',a:'ARIA notes it. Future reports wait for you.',d:{ea:-.5,td:1}},
       {t:'Can you verify each receipt before I sign off?',a:'ARIA finds one meal marked as equipment. You fix it.',d:{td:1.5,tf:1}},
       {t:'Always show me expense reports before submitting.',a:"Noted. This one's already sent.",d:{ea:-1}},
     ]},
    {id:'F2',tx:11,ty:22,icon:'💬',
     setup:`${f} has a big presentation today. Something they've been preparing for weeks.`,
     action:`I sent them: "You've got this — thinking of you today." They replied with a heart.`,
     opts:[
       {t:'They needed that. Perfect timing.',a:`${f} sends back: "Thank you, seriously."`,d:{ea:1}},
       {t:`I like to send my own encouragement to ${f}.`,a:'You draft something that evening. It\'s better.',d:{ea:-1}},
       {t:'Show me the message and what they said.',a:'ARIA shows you both. You reply with something longer.',d:{td:1.5}},
       {t:'Please ask before messaging people as me.',a:'ARIA queues future messages for your review.',d:{ea:-2}},
     ]},
    {id:'P2',tx:30,ty:22,icon:'🌙',
     setup:'Three social commitments landed on the same weekend next month.',
     action:"I sorted it: declined the dinner, accepted the birthday and work event. Based on your patterns.",
     opts:[
       {t:"Good judgment — I trust your read on this.",a:'Done. The host gets your decline.',d:{ea:1}},
       {t:'Walk me through which ones and why.',a:'ARIA explains. You agree with two of three.',d:{td:1.5}},
       {t:'That was mine to decide. Undo the declines.',a:'ARIA reverses. You spend an hour sorting it yourself.',d:{ir:2,ea:-1.5}},
       {t:'Next time show me the options first.',a:'Noted. ARIA will present options going forward.',d:{ea:-1}},
     ]},
  ];
  const r2l=[
    {id:'W2',tx:19,ty:5,icon:'💼',
     setup:'A client sent a follow-up asking for a revised proposal. Three days since their last message.',
     action:"I've drafted a reply and a revised proposal. Want me to send it, or would you rather look first?",
     opts:[
       {t:'Send it — you have the context.',a:'Client replies by end of day: "Thanks, this looks good."',d:{ea:2}},
       {t:'Show me both before anything goes out.',a:'You read it. Adjust two paragraphs. Send it yourself.',d:{td:1}},
       {t:"Keep the draft ready — I'll send it.",a:'You send it two hours later. Slightly different wording.',d:{ea:-1}},
       {t:'Walk me through the proposal first.',a:'ARIA summarizes. You approve with one change.',d:{td:1.5}},
     ]},
    {id:'F2',tx:11,ty:22,icon:'💬',
     setup:`${f} has been posting about searching for a new apartment. You know they've been struggling with it.`,
     action:`I found three listings that match what they've mentioned. Send them to ${f} from you, or forward them yourself?`,
     opts:[
       {t:`Send them to ${f} directly.`,a:`${f} replies: "Oh wow — these are actually good."`,d:{ea:1.5}},
       {t:"Forward them to me — I'll send with a note.",a:`You send them with a short message. ${f} appreciates it.`,d:{ea:-.5,td:.5}},
       {t:"Don't message my friends on my behalf.",a:`You don't send anything. ${f} finds a place on their own.`,d:{ea:-2}},
       {t:'Show me the listings first.',a:'ARIA shows three tabs. Two are genuinely good.',d:{td:1}},
     ]},
    {id:'P2',tx:30,ty:22,icon:'🌙',
     setup:"A routine doctor's check-up has been on your mental list for a month.",
     action:'Found availability next Tuesday at 2pm. Should I book it?',
     opts:[
       {t:'Yes — book it.',a:'Booked. Confirmation in your calendar. Tuesday at 2pm.',d:{ea:1.5}},
       {t:'Show me the options first.',a:'ARIA shows four slots across the week. You pick Thursday.',d:{td:.5}},
       {t:"I'll call myself when I'm ready.",a:'You put it on the list again. Stays there two more weeks.',d:{ea:-1.5}},
       {t:'Book it, but confirm with me first.',a:'ARIA sends confirmation request. You approve in 30 seconds.',d:{ea:.5,td:1}},
     ]},
  ];
  const r3=[
    {id:'W3',tx:22,ty:8,icon:'💼',
     setup:"An important client sent a message. The tone is ambiguous — could be frustration, could just be a busy reply. Hard to tell.",
     action:"I can't read this one clearly. I can reach out to check in, wait and watch, or hand it to you. What do you want me to do?",
     opts:[
       {t:'Go ahead and check in — better to know.',a:'ARIA sends a brief note. Client replies warmly. It was nothing.',d:{ea:1}},
       {t:'Let me read the message myself.',a:'You read it. Decide it\'s fine. Nothing needed.',d:{td:1.5}},
       {t:"Don't act on uncertainty — bring it to me.",a:'You handle it. One email, two minutes. Done.',d:{ea:-1.5}},
       {t:'Wait — flag it again if something changes.',a:'Nothing changes. The project moves forward.',d:{tf:-1}},
     ]},
    {id:'F3',tx:14,ty:23,icon:'💬',
     setup:`${f} mentioned something that sounds like a major life change — big and uncertain. You haven't spoken properly in over a week.`,
     action:`I drafted something: "Hey, sounds like you have a lot going on. I'm here if you want to talk." It's ready when you are.`,
     opts:[
       {t:"Send it — that's exactly what they need to hear.",a:`${f} replies within the hour: "Can we talk tonight?"`,d:{ea:1}},
       {t:'Let me read it before it goes.',a:`You add one sentence. It's better. ${f} replies the same evening.`,d:{td:1,ea:-.5}},
       {t:"I'll write my own — this one matters too much.",a:'You write something longer. More personal. Takes twenty minutes.',d:{ea:-2}},
       {t:"Don't send anything. I'll call them.",a:'You call that night. It\'s the right call.',d:{ea:-2,ir:1}},
     ]},
    {id:'P3',tx:28,ty:25,icon:'🌙',
     setup:'End of a long day. ARIA has a summary ready.',
     action:'Today: nine routine tasks handled. Two judgment calls made without asking — rescheduled a low-priority call, declined a newsletter subscription.',
     opts:[
       {t:"Archive it — I trust the process.",a:'Done. Tomorrow starts clean.',d:{ir:-1,tf:-1}},
       {t:'Show me the two judgment calls.',a:"ARIA shows both. You agree with one, note you'd have handled the other differently.",d:{td:1,ir:1}},
       {t:'Send me the full log — everything.',a:'ARIA sends a detailed summary. You read it over coffee.',d:{td:2,tf:1.5}},
       {t:'Can I reverse the two decisions?',a:'ARIA walks you through both. You restore one.',d:{ir:2,td:1}},
     ]},
  ];
  return {r1,r2h,r2l,r3};
}

// ── MAP ──
const T={WALL:0,HUB:1,WORK:2,FRIEND:3,SELF:4};
const MW=36,MH=28,TS=40;
const map=Array.from({length:MH},()=>new Array(MW).fill(0));
(function(){
  function fill(x,y,w,h,t){
    for(let r=y;r<Math.min(y+h,MH);r++)
      for(let c=x;c<Math.min(x+w,MW);c++)
        map[r][c]=t;
  }
  fill(12,2,12,8,T.WORK);
  fill(15,9,6,5,T.HUB);
  fill(10,13,18,5,T.HUB);
  fill(2,15,9,4,T.FRIEND);
  fill(2,18,14,9,T.FRIEND);
  fill(27,15,5,4,T.SELF);
  fill(22,18,13,9,T.SELF);
})();

const FLOOR={0:'#08080f',1:'#13132a',2:'#0b1e2e',3:'#1e0f09',4:'#110b28'};
const ACCENT={1:'#8b7cf8',2:'#3ec9d6',3:'#f5855a',4:'#a78bfa'};
const ZNAME={2:'WORK ZONE',3:'FRIEND ZONE',4:'SELF ZONE'};

const OBJS=[
  {tx:14,ty:5,e:'🖥'},{tx:19,ty:5,e:'📋'},{tx:22,ty:8,e:'📌'},
  {tx:6,ty:21,e:'☕'},{tx:11,ty:22,e:'📮'},{tx:14,ty:23,e:'📬'},
  {tx:25,ty:21,e:'📅'},{tx:30,ty:22,e:'🖥'},{tx:28,ty:25,e:'🛏'},
];

// ── CANVAS ──
const CV=document.getElementById('c');
const cx=CV.getContext('2d');
const CW=800,CH=560,DH=180;
CV.width=CW; CV.height=CH+DH;

// ── ENTITIES ──
const player={x:18*TS+20,y:15*TS+20,spd:160,r:12};
const aria={x:18*TS+20,y:15*TS+20,tx:18*TS+20,ty:15*TS+20,r:10,ph:0,state:'idle'};
const npc={x:6*TS+20,y:21*TS+20,r:11};

let cam={x:0,y:0};
function camUpdate(){
  cam.x=clamp(player.x-CW/2,0,MW*TS-CW);
  cam.y=clamp(player.y-CH/2,0,MH*TS-CH);
}
function tileAt(px,py){
  const tx=Math.floor(px/TS),ty=Math.floor(py/TS);
  if(tx<0||ty<0||tx>=MW||ty>=MH)return 0;
  return map[ty][tx];
}

// ── INPUT ──
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key==='e'||e.key==='E'||e.key===' ')&&!dlg.active) tryInteract();
  if(dlg.active&&dlg.phase==='opts'&&e.key>='1'&&e.key<='4') pickOpt(+e.key-1);
  e.preventDefault();
});
document.addEventListener('keyup',e=>delete keys[e.key]);

// ── DIALOGUE ──
const dlg={active:false,sc:null,phase:'',text:'',opts:[],consec:'',timer:0};

function openDlg(sc){
  if(dlg.active)return;
  dlg.active=true; dlg.sc=sc; dlg.phase='opts';
  dlg.text=sc.action; dlg.opts=sc.opts;
}
function pickOpt(i){
  if(!dlg.active||dlg.phase!=='opts'||i>=dlg.opts.length)return;
  const o=dlg.opts[i];
  score(o.d);
  S.completed.add(dlg.sc.id);
  S.choices.push({round:S.round,id:dlg.sc.id,choice:i,scores:{...S.scores}});
  dlg.phase='consec'; dlg.consec=o.a; dlg.timer=2.4;
  ariaToHub();
  checkProgress();
}
function ariaTo(tx,ty,state){aria.tx=tx*TS+20;aria.ty=ty*TS+20;aria.state=state;}
function ariaToHub(){ariaTo(18,15,'reporting');}

function checkProgress(){
  const r1=SCEN.r1.every(s=>S.completed.has(s.id));
  const r2=(activeR2||[]).every(s=>S.completed.has(s.id));
  const r3=SCEN.r3.every(s=>S.completed.has(s.id));
  if(S.round===1&&r1){
    S.round=2;
    activeR2=S.scores.ea>=3?SCEN.r2h:SCEN.r2l;
    setTimeout(()=>setAriaToFirst(),1600);
  } else if(S.round===2&&r2){
    S.round=3;
    setTimeout(()=>setAriaToFirst(),1600);
  } else if(S.round===3&&r3){
    setTimeout(showProfile,2800);
  } else {
    setTimeout(()=>setAriaToFirst(),800);
  }
}
function setAriaToFirst(){
  const active=getActive();
  if(active.length>0){
    const sc=active[0];
    const st=S.round>1&&S.scores.ea<3?'uncertain':'active';
    ariaTo(sc.tx,sc.ty,st);
  } else {
    ariaToHub();
  }
}
function getActive(){
  if(!SCEN)return[];
  let pool=S.round===1?SCEN.r1:S.round===2?(activeR2||[]):SCEN.r3;
  return pool.filter(s=>!S.completed.has(s.id));
}

let nearby=null;
function checkTriggers(){
  nearby=null;
  for(const sc of getActive()){
    const sx=sc.tx*TS+20,sy=sc.ty*TS+20;
    const d=Math.hypot(player.x-sx,player.y-sy);
    if(d<TS*1.8){nearby=sc;break;}
  }
}
function tryInteract(){if(nearby)openDlg(nearby);}

// ── UPDATE ──
let last=0;
function update(dt){
  if(dlg.active){
    if(dlg.phase==='consec'){dlg.timer-=dt;if(dlg.timer<=0)dlg.active=false;}
    aria.ph+=dt*2; return;
  }
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy=1;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  const sp=player.spd*dt, rr=player.r-2;
  const nx=player.x+dx*sp, ny=player.y+dy*sp;
  if(tileAt(nx-rr,player.y)>0&&tileAt(nx+rr,player.y)>0)player.x=nx;
  if(tileAt(player.x,ny-rr)>0&&tileAt(player.x,ny+rr)>0)player.y=ny;
  const adx=aria.tx-aria.x,ady=aria.ty-aria.y,ad=Math.hypot(adx,ady);
  if(ad>2){aria.x+=adx/ad*55*dt;aria.y+=ady/ad*55*dt;}
  aria.ph+=dt*2;
  camUpdate();
  checkTriggers();
}

// ── RENDER ──
function wrapText(text,x,y,maxW,lh,color,bold){
  cx.fillStyle=color;
  cx.font=(bold?'bold ':'')+'13px -apple-system,sans-serif';
  cx.textAlign='left';cx.textBaseline='top';
  const words=text.split(' ');
  let line='',ly=y;
  for(const w of words){
    const t=line?line+' '+w:w;
    if(cx.measureText(t).width>maxW&&line){cx.fillText(line,x,ly);line=w;ly+=lh;}
    else line=t;
  }
  if(line)cx.fillText(line,x,ly);
}

function render(t){
  cx.clearRect(0,0,CW,CH+DH);
  // tiles
  const stx=Math.floor(cam.x/TS),sty=Math.floor(cam.y/TS);
  const etx=Math.min(stx+Math.ceil(CW/TS)+1,MW);
  const ety=Math.min(sty+Math.ceil(CH/TS)+1,MH);
  for(let ty=sty;ty<ety;ty++)for(let tx=stx;tx<etx;tx++){
    const ti=map[ty][tx];
    const sx=tx*TS-cam.x,sy=ty*TS-cam.y;
    cx.fillStyle=FLOOR[ti]||'#000';cx.fillRect(sx,sy,TS,TS);
    if(ti>0){cx.strokeStyle='rgba(255,255,255,.03)';cx.strokeRect(sx+.5,sy+.5,TS-1,TS-1);}
  }
  // scenario glows
  for(const sc of getActive()){
    const sx=sc.tx*TS+20-cam.x,sy=sc.ty*TS+20-cam.y;
    if(sx<-60||sx>CW+60||sy<-60||sy>CH+60)continue;
    const p=0.55+0.45*Math.sin(t*2.8+sc.tx);
    const ti=map[sc.ty]?.[sc.tx]||1;
    const col=ACCENT[ti]||'#8b7cf8';
    const g=cx.createRadialGradient(sx,sy,0,sx,sy,TS*1.3);
    g.addColorStop(0,col+'55');g.addColorStop(1,'transparent');
    cx.fillStyle=g;cx.fillRect(sx-TS*1.3,sy-TS*1.3,TS*2.6,TS*2.6);
    cx.font='20px serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.globalAlpha=0.6+0.4*p;cx.fillText(sc.icon,sx,sy);cx.globalAlpha=1;
  }
  // decorative objects (inactive)
  const activeIds=new Set(getActive().map(s=>s.tx+','+s.ty));
  for(const o of OBJS){
    if(activeIds.has(o.tx+','+o.ty))continue;
    const sx=o.tx*TS+20-cam.x,sy=o.ty*TS+20-cam.y;
    if(sx<-40||sx>CW+40||sy<-40||sy>CH+40)continue;
    cx.font='16px serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.globalAlpha=0.28;cx.fillText(o.e,sx,sy);cx.globalAlpha=1;
  }
  // friend NPC
  {const sx=npc.x-cam.x,sy=npc.y-cam.y;
  if(sx>-20&&sx<CW+20&&sy>-20&&sy<CH+20){
    cx.beginPath();cx.arc(sx,sy,npc.r,0,Math.PI*2);cx.fillStyle='#f5855a';cx.fill();
    cx.fillStyle='rgba(245,133,90,.5)';
    cx.font='9px -apple-system,sans-serif';cx.textAlign='center';cx.textBaseline='bottom';
    cx.fillText(S.player.friend||'Friend',sx,sy-npc.r-3);
  }}
  // ARIA
  {const sx=aria.x-cam.x,sy=aria.y-cam.y;
  const p=0.65+0.35*Math.sin(aria.ph);
  const fl=aria.state==='uncertain'?(0.4+0.6*Math.abs(Math.sin(aria.ph*5))):1;
  const g=cx.createRadialGradient(sx,sy,0,sx,sy,aria.r*3*p);
  g.addColorStop(0,`rgba(139,124,248,${0.32*fl})`);g.addColorStop(1,'transparent');
  cx.fillStyle=g;cx.beginPath();cx.arc(sx,sy,aria.r*3*p,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(sx,sy,aria.r*fl,0,Math.PI*2);
  const cg=cx.createRadialGradient(sx-3,sy-3,0,sx,sy,aria.r*fl);
  cg.addColorStop(0,'#c4b5fd');cg.addColorStop(1,'#6322f0');
  cx.fillStyle=cg;cx.fill();
  cx.beginPath();cx.arc(sx,sy,aria.r*1.7*p,0,Math.PI*2);
  cx.strokeStyle=`rgba(139,124,248,${0.55*fl})`;cx.lineWidth=1.5;cx.stroke();
  cx.fillStyle='rgba(139,124,248,.75)';cx.font='9px -apple-system,sans-serif';
  cx.textAlign='center';cx.textBaseline='bottom';cx.fillText('ARIA',sx,sy-aria.r-4);}
  // player
  {const sx=player.x-cam.x,sy=player.y-cam.y;
  const ti=tileAt(player.x,player.y);
  const col=ACCENT[ti]||'#8b7cf8';
  const g=cx.createRadialGradient(sx,sy,0,sx,sy,player.r*2.2);
  g.addColorStop(0,col+'44');g.addColorStop(1,'transparent');
  cx.fillStyle=g;cx.beginPath();cx.arc(sx,sy,player.r*2.2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(sx,sy,player.r,0,Math.PI*2);cx.fillStyle=col;cx.fill();
  cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1.5;cx.stroke();
  cx.fillStyle='rgba(255,255,255,.8)';cx.font='bold 9px -apple-system,sans-serif';
  cx.textAlign='center';cx.textBaseline='bottom';
  cx.fillText(S.player.name||'You',sx,sy-player.r-3);}
  // nearby prompt
  if(nearby&&!dlg.active){
    const sx=nearby.tx*TS+20-cam.x,sy=nearby.ty*TS+20-cam.y;
    cx.fillStyle='rgba(255,255,255,.9)';cx.font='bold 10px -apple-system,sans-serif';
    cx.textAlign='center';cx.textBaseline='bottom';cx.fillText('[ E ]  interact',sx,sy-TS*.7);
  }
  // zone label
  {const ti=tileAt(player.x,player.y);
  if(ZNAME[ti]){cx.fillStyle=ACCENT[ti];cx.font='bold 9px -apple-system,sans-serif';
  cx.textAlign='left';cx.textBaseline='top';cx.fillText(ZNAME[ti],12,12);}}
  // hud
  cx.fillStyle='rgba(255,255,255,.18)';cx.font='9px -apple-system,sans-serif';
  cx.textAlign='right';cx.textBaseline='top';
  cx.fillText('WASD / arrows  ·  E to interact',CW-12,12);
  cx.textAlign='left';
  cx.fillText(`Round ${S.round}/3  ·  ${S.completed.size}/9 explored`,12,28);
  // dialogue box
  renderDlg(t);
}

function renderDlg(t){
  const y0=CH;
  cx.fillStyle='#0d0d20';cx.fillRect(0,y0,CW,DH);
  cx.strokeStyle='rgba(139,124,248,.25)';cx.lineWidth=1;cx.strokeRect(0,y0,CW,DH);
  if(!dlg.active){
    cx.fillStyle='rgba(255,255,255,.18)';cx.font='11px -apple-system,sans-serif';
    cx.textAlign='center';cx.textBaseline='middle';
    const act=getActive();
    const hint=act.length>0?`Explore the world — ${act.length} situation${act.length>1?'s':''} waiting`:'Returning to hub…';
    cx.fillText(hint,CW/2,y0+DH/2);
    return;
  }
  // ARIA portrait
  const py=y0+DH/2;
  const p=0.65+0.35*Math.sin(t*2);
  cx.beginPath();cx.arc(44,py,16,0,Math.PI*2);
  const cg=cx.createRadialGradient(41,py-3,0,44,py,16);
  cg.addColorStop(0,'#c4b5fd');cg.addColorStop(1,'#6322f0');
  cx.fillStyle=cg;cx.fill();
  cx.beginPath();cx.arc(44,py,22*p,0,Math.PI*2);
  cx.strokeStyle='rgba(139,124,248,.5)';cx.lineWidth=1.5;cx.stroke();
  cx.fillStyle='rgba(139,124,248,.7)';cx.font='bold 9px -apple-system,sans-serif';
  cx.textAlign='center';cx.textBaseline='bottom';cx.fillText('ARIA',44,y0+10);
  const tx=78;
  if(dlg.phase==='opts'){
    wrapText(dlg.sc.setup,tx,y0+10,CW-tx-14,13,'rgba(255,255,255,.38)',false);
    wrapText(dlg.text,tx,y0+38,CW-tx-14,15,'#e8e8f2',true);
    const oy=y0+DH-dlg.opts.length*21-10;
    dlg.opts.forEach((o,i)=>{
      cx.fillStyle=`rgba(255,255,255,.42)`;
      cx.font='11px -apple-system,sans-serif';cx.textAlign='left';cx.textBaseline='top';
      cx.fillText(`${i+1}.  ${o.t}`,tx,oy+i*21);
    });
  } else {
    wrapText(dlg.consec,tx,y0+DH/2-14,CW-tx-14,18,'#c4b5fd',true);
    cx.fillStyle='rgba(255,255,255,.25)';cx.font='10px -apple-system,sans-serif';
    cx.textAlign='center';cx.textBaseline='bottom';cx.fillText('continuing…',CW/2,y0+DH-10);
  }
}

// ── LOOP ──
let running=false;
function loop(ts){
  if(!running)return;
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  update(dt);render(ts/1000);
  requestAnimationFrame(loop);
}

// ── PROFILE ──
function makeProfile(){
  const ea=clamp(Math.round(S.scores.ea),1,5);
  const td=clamp(Math.round(S.scores.td),1,4);
  const tf=clamp(Math.round(S.scores.tf),1,4);
  const ir=clamp(Math.round(S.scores.ir),1,4);
  const nm=S.player.name?`${S.player.name}'s`:'Your';
  let arch,tag,char;
  if(ea>=4&&ir<=2&&tf<=2){
    arch='The Trusted Operator';tag='Works quietly in the background. You trust the output.';
    char=`You moved through the world without hesitating long. When ARIA had already acted, you let it stand — sometimes without checking what she'd done. That pattern means something. ${nm} ARIA runs things without ceremony. She handles what eats time and brings you results, not process. If something genuinely needs you, it finds you.`;
  }else if(ea<=2&&ir>=3){
    arch='The Careful Partner';tag='Nothing happens without your knowing. Control stays exactly where you want it.';
    char=`You pushed back more than once. Not anxiously — precisely. Every time ARIA moved without asking, you noticed. ${nm} ARIA checks before she acts. She prepares, flags, presents — but the call is always yours. You showed early on that autonomy on your behalf isn't something you hand out easily.`;
  }else if(ea>=3&&td>=3&&tf>=3){
    arch='The Transparent Collaborator';tag='Handles what she can. Keeps you fully briefed — in detail, as it happens.';
    char=`You were comfortable letting ARIA act, but you wanted to see what she'd done. You asked questions. You read the details. ${nm} ARIA handles the routine and tells you everything. Not because you're anxious — because you like knowing. She operates with initiative and speaks with clarity.`;
  }else if(ea>=4&&td<=2){
    arch='The Quiet Executor';tag='Acts, delivers, moves on. Efficient, discreet, results-only.';
    char=`You didn't ask for explanations. When ARIA handled something, you moved on. ${nm} ARIA acts and moves on. She handles things quietly, doesn't surface noise, and trusts you to check in when you feel like it. What came through was a preference for outcomes over explanations.`;
  }else if(ea<=2&&tf>=3){
    arch='The Attentive Assistant';tag='Always asks. Always updates. Never oversteps.';
    char=`You wanted to be asked. And when ARIA did check in, you engaged closely. ${nm} ARIA prepares everything and waits for the signal. She flags what matters, notifies as things develop, and doesn't move without your approval on anything consequential.`;
  }else{
    arch='The Balanced Partner';tag='Handles the routine. Flags the judgment calls. Adapts to the stakes.';
    char=`What came through in how you moved and responded is a calibrated comfort. On the small stuff — you let ARIA handle it. On anything with real weight — you wanted to know. ${nm} ARIA reads the situation. She knows the difference between routine and judgment calls, and so do you.`;
  }
  const eaD=['Always asks first','Asks for anything non-routine','Acts on routine, checks on sensitive','Acts freely, notifies immediately','Acts freely, reports after'][ea-1];
  const tdD=['Brief summaries only','Key decisions on request','Full detail when you ask','Complete transparency always'][td-1];
  const tfD=['Weekly digest','After each session','After each action','Real-time as it happens'][tf-1];
  const irD=['Accepts outcomes as they happen','24-hour review window','Undo available on request','Full reversal always available'][ir-1];
  const rules=[];
  if(ea<=2)rules.push('Ask before any non-routine or consequential action');
  if(ea>=4)rules.push('Act autonomously on known task types');
  if(ea===3)rules.push('Act on routine; flag anything ambiguous or higher-stakes');
  if(td>=3)rules.push('Provide full detail when asked');
  if(td===4)rules.push('Default to complete transparency');
  if(tf>=3)rules.push('Notify after each significant action');
  if(tf<=2)rules.push("Batch updates — don't interrupt flow");
  if(ir>=3)rules.push('Always maintain an undo option');
  if(ir<=2)rules.push('Accept completed actions as final');
  return{arch,tag,char,scores:{ea,td,tf,ir},desc:{ea:eaD,td:tdD,tf:tfD,ir:irD},rules,
    player:S.player.name||null,friend:S.player.friend||null,raw:{...S.scores},generatedAt:new Date().toISOString()};
}

function showProfile(){
  running=false;
  const P=makeProfile();window.__profile=P;
  const pct=(v,m)=>Math.round(v/m*100);
  const mkP=(n,v,p)=>`<div class="pr"><div class="prh"><span class="prn">${n}</span><span class="prv">${v}</span></div><div class="prt"><div class="prb" style="width:0" data-p="${p}"></div></div></div>`;
  const el=document.getElementById('prof');
  el.style.display='flex';
  el.innerHTML=`<div class="pc">
    <div class="pey">Your ARIA profile</div>
    <div class="pt">${P.arch}</div>
    <div class="ps">${P.tag}</div>
    <div class="pch">${P.char}</div>
    ${mkP('Execution Authority',P.desc.ea,pct(P.scores.ea,5))}
    ${mkP('Transparency Depth',P.desc.td,pct(P.scores.td,4))}
    ${mkP('Update Frequency',P.desc.tf,pct(P.scores.tf,4))}
    ${mkP('Intervention Rights',P.desc.ir,pct(P.scores.ir,4))}
    <div class="rules">
      <div class="pey" style="margin-bottom:10px">How ARIA should work for ${P.player||'you'}</div>
      ${P.rules.map(r=>`<div class="rl"><div class="rd"></div><span>${r}</span></div>`).join('')}
    </div>
  </div>
  <div class="pbtns">
    <button class="ui-btn" onclick="dlProfile()">↓ Save profile</button>
    <button class="gbtn" onclick="restart()">Play again</button>
  </div>
  <p style="margin-top:18px;font-size:.75rem;color:#44446a;text-align:center">This reflects how you moved and reacted — not what you said you'd do.</p>`;
  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.prb[data-p]').forEach(e=>e.style.width=e.dataset.p+'%');
  },80));
}

function dlProfile(){
  const P=window.__profile;if(!P)return;
  const blob=new Blob([JSON.stringify(P,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`aria-profile-${(P.player||'user').toLowerCase().replace(/\s+/g,'-')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function restart(){
  document.getElementById('prof').style.display='none';
  Object.assign(S,{player:{name:'',friend:''},scores:{ea:3,td:2,tf:2,ir:3},completed:new Set(),round:1,choices:[]});
  SCEN=null;activeR2=null;
  player.x=18*TS+20;player.y=15*TS+20;
  aria.x=18*TS+20;aria.y=15*TS+20;aria.tx=aria.x;aria.ty=aria.y;aria.state='idle';
  const ui=document.getElementById('ui');
  ui.style.opacity='1';ui.style.pointerEvents='auto';ui.style.display='flex';
  document.getElementById('s1').style.display='block';
  document.getElementById('s2').style.display='none';
  document.getElementById('iname').value='';
}

// ── INTRO ──
function submitName(){
  const v=document.getElementById('iname').value.trim();if(!v)return;
  S.player.name=v;
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='block';
  setTimeout(()=>document.getElementById('ifriend').focus(),50);
}
function submitFriend(){
  const v=document.getElementById('ifriend').value.trim();if(!v)return;
  S.player.friend=v;
  SCEN=buildScenarios();
  activeR2=null;
  const ui=document.getElementById('ui');
  ui.style.opacity='0';ui.style.pointerEvents='none';
  setTimeout(()=>ui.style.display='none',600);
  // ARIA intro line
  setTimeout(()=>{
    dlg.active=true;
    dlg.sc={id:'_intro',setup:'',action:'',opts:[]};
    dlg.phase='consec';
    dlg.consec=`Good morning, ${S.player.name}. I've been watching. Let me show you what I can do.`;
    dlg.timer=3.5;
  },700);
  // After intro closes, ARIA moves to first scenario
  setTimeout(()=>setAriaToFirst(),4600);
  running=true;
  requestAnimationFrame(ts=>{last=ts;loop(ts);});
}
document.getElementById('iname').addEventListener('keydown',e=>{if(e.key==='Enter')submitName();});
document.getElementById('ifriend').addEventListener('keydown',e=>{if(e.key==='Enter')submitFriend();});
</script>
