<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Day ARIA Arrived</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c1a;
  --surface: #14142e;
  --surface2: #1c1c3a;
  --text: #e8e8f2;
  --text-dim: #7878a8;
  --text-hint: #44446a;
  --aria: #8b7cf8;
  --aria-glow: rgba(139,124,248,0.2);
  --work-c: #3ec9d6;
  --work-d: rgba(62,201,214,0.13);
  --friend-c: #f5855a;
  --friend-d: rgba(245,133,90,0.13);
  --self-c: #a78bfa;
  --self-d: rgba(167,139,250,0.13);
  --border: rgba(255,255,255,0.07);
  --border-h: rgba(255,255,255,0.16);
  --r: 14px;
  --r-lg: 22px;
  --shadow: 0 8px 40px rgba(0,0,0,0.5);
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  line-height: 1.6;
}

#progress-track {
  position: fixed; top: 0; left: 0; right: 0;
  height: 2px; background: rgba(255,255,255,0.04); z-index: 200;
}
#progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--aria), #c084fc);
  transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
}

#app {
  width: 100%; max-width: 660px; min-height: 100vh;
  display: flex; flex-direction: column; padding: 0 24px 80px;
}

.screen {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; padding: 48px 0;
  min-height: calc(100vh - 120px);
  animation: sIn 0.42s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes sIn {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

.eyebrow {
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 10px;
}
.title {
  font-size: clamp(2rem, 5vw, 2.8rem);
  font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.18; margin-bottom: 16px;
}
.subtitle {
  font-size: 1.05rem; color: var(--text-dim);
  line-height: 1.75; margin-bottom: 32px;
}
.q-text {
  font-size: 1.35rem; font-weight: 600;
  line-height: 1.4; margin-bottom: 6px;
}
.q-sub {
  font-size: 0.9rem; color: var(--text-dim);
  margin-bottom: 28px; line-height: 1.6;
}

/* ARIA glyph */
.glyph {
  width: 68px; height: 68px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #a78bfa 0%, #6322f0 100%);
  box-shadow: 0 0 28px var(--aria-glow), 0 0 56px rgba(99,34,240,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 24px; position: relative; flex-shrink: 0;
}
.glyph::after {
  content: ''; position: absolute; inset: -5px; border-radius: 50%;
  border: 1.5px solid rgba(139,124,248,0.35);
  animation: glyphPulse 2.2s ease-in-out infinite;
}
.glyph.small { width: 52px; height: 52px; font-size: 20px; }
@keyframes glyphPulse {
  0%,100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.07); opacity: 0.9; }
}

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px;
}

/* Scene */
.scene {
  font-size: 0.95rem; color: var(--text-dim);
  line-height: 1.75; font-style: italic;
  margin-bottom: 20px; padding: 14px 18px;
  background: rgba(255,255,255,0.025);
  border-radius: var(--r);
  border-left: 2px solid var(--border);
}

/* ARIA notification */
.notif {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 22px; margin-bottom: 28px;
  position: relative; overflow: hidden;
}
.notif::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--ctx-color, var(--aria));
}
.notif-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 11px;
}
.notif-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; background: var(--ctx-dim, var(--aria-glow));
}
.notif-who { font-size: 0.82rem; font-weight: 700; color: var(--aria); }
.notif-when { font-size: 0.78rem; color: var(--text-hint); margin-left: auto; }
.notif-body { font-size: 0.97rem; line-height: 1.65; }

/* Choices */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 17px 20px;
  cursor: pointer; text-align: left; width: 100%;
  display: flex; flex-direction: column; gap: 3px;
  transition: border-color 0.18s, background 0.18s, transform 0.18s;
  font-family: inherit;
}
.choice:hover:not(:disabled) {
  border-color: var(--border-h); background: var(--surface2);
  transform: translateY(-2px); box-shadow: var(--shadow);
}
.choice:active:not(:disabled) { transform: translateY(0); }
.choice.picked {
  border-color: var(--aria); background: rgba(139,124,248,0.1);
}
.choice:disabled { cursor: default; opacity: 0.55; }
.choice.picked:disabled { opacity: 1; }
.choice-t { font-size: 0.97rem; font-weight: 500; color: var(--text); line-height: 1.45; }
.choice-s { font-size: 0.82rem; color: var(--text-dim); }

/* Consequence text — appears inside picked card */
.consequence {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid rgba(139,124,248,0.25);
  font-size: 0.88rem; color: var(--aria);
  font-style: italic; line-height: 1.55;
  animation: fadeUp 0.35s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Inputs */
.input-wrap { margin-bottom: 24px; }
.field {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 15px 20px; color: var(--text);
  font-size: 1.1rem; font-family: inherit; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field:focus { border-color: var(--aria); box-shadow: 0 0 0 3px var(--aria-glow); }
.field::placeholder { color: var(--text-hint); }
.field.err { border-color: #f07080; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 26px; border-radius: 10px;
  font-size: 0.97rem; font-weight: 600; cursor: pointer;
  border: none; font-family: inherit; transition: all 0.2s ease;
}
.btn-p { background: var(--aria); color: #fff; }
.btn-p:hover {
  background: #7c6af7; transform: translateY(-1px);
  box-shadow: 0 8px 24px var(--aria-glow);
}
.btn-ghost {
  background: var(--surface2); color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border-h); color: var(--text); }

/* Profile */
.profile-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 28px 28px 24px;
  margin-bottom: 20px;
}
.profile-char {
  font-size: 0.97rem; line-height: 1.8;
  color: var(--text); margin-bottom: 26px;
}
.param-row { margin-bottom: 18px; }
.param-head {
  display: flex; justify-content: space-between;
  align-items: baseline; margin-bottom: 5px;
}
.param-name {
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-dim);
}
.param-val { font-size: 0.82rem; color: var(--aria); font-weight: 600; }
.param-track {
  height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
}
.param-bar {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--aria), #c084fc);
  width: 0%; transition: width 1.1s cubic-bezier(0.4,0,0.2,1);
}
.rules {
  margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--border);
}
.rule-row {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 10px; font-size: 0.88rem; color: var(--text-dim);
}
.rule-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--aria); margin-top: 8px; flex-shrink: 0;
}
.json-block {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.78rem; color: var(--text-dim);
  white-space: pre; overflow-x: auto; margin-top: 20px;
  display: none;
}

/* Thinking dots */
.dots { display: flex; gap: 8px; justify-content: center; margin: 28px 0; }
.dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--aria);
  animation: dotB 1.5s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes dotB {
  0%,80%,100% { transform: scale(0.55); opacity: 0.35; }
  40% { transform: scale(1); opacity: 1; }
}

@media (max-width: 480px) {
  #app { padding: 0 16px 60px; }
  .title { font-size: 1.75rem; }
  .choice { padding: 14px 16px; }
  .profile-card { padding: 20px; }
}
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>
<div id="app"><div id="root"></div></div>

<script>
// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
const S = {
  player: { name: '', role: '', friend: '' },
  scores: { ea: 3.0, td: 2.0, tf: 2.0, ir: 3.0 },
  round: 0, choices: [], qIndex: 0,
  scenarioIndex: 0, roundScenarios: [],
};

function score(d) {
  Object.entries(d).forEach(([k,v]) => {
    S.scores[k] = Math.max(1, Math.min(5, S.scores[k] + v));
  });
}
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

// ─────────────────────────────────────────────────────
// SCENARIOS  (consequence line `a:` is what the player
// sees for 2.2s after picking — pure story, no scoring signal)
// ─────────────────────────────────────────────────────
function buildScenarios() {
  const n = S.player.name || 'you';
  const f = S.player.friend || 'your friend';

  const r1 = [
    // WORK ───────────────────────────────────────────
    {
      ctx:'work', label:'Work', icon:'💼',
      setup:`It's a busy Tuesday. Your manager sent a message about a project kick-off next week. You were back-to-back in calls and never saw it.`,
      action:`Your inbox was piling up. I caught your manager's note before it slipped — confirmed Thursday at 9am on your behalf. Looked like a clean yes.`,
      opts:[
        { t:`Works for me — good call.`,       s:`One less thing to track.`,             a:`Thursday blocked. Your manager sends a thumbs-up.`,                                         d:{ea:1.5} },
        { t:`Good, but flag it to me next time.`, s:`Same answer, but I want to see first.`, a:`ARIA notes it. The meeting stays. Thursday at 9.`,                                         d:{ea:-0.5,td:1} },
        { t:`You shouldn't confirm things without asking me.`, s:`Meetings are mine to accept.`, a:`You send a correction yourself. The time shifts to Friday. Takes four minutes.`,       d:{ea:-2} },
        { t:`Send a follow-up — say I need to confirm.`,      s:`I want to walk that back.`,   a:`ARIA sends it. Your manager replies: "No rush, let me know."`,                           d:{ea:-1.5,ir:1.5} },
      ]
    },
    // FRIEND ─────────────────────────────────────────
    {
      ctx:'friend', label:f, icon:'💬',
      setup:`${f} has been going through something hard lately. You've been meaning to reach out for days — just haven't found the moment.`,
      action:`${f} posted something that stopped me mid-scroll. I sent them a message from you: "Hey — been thinking of you. Coffee this week?"`,
      opts:[
        { t:`That's exactly what I'd have written. Thank you.`, s:`They'll be glad to hear from you.`,     a:`${f} replies twenty minutes later: "Would love that."`,                                     d:{ea:1.5} },
        { t:`Thoughtful — but I write my own messages to them.`, s:`The wording matters to me.`,          a:`You put it on your list. Three days pass.`,                                                   d:{ea:-1} },
        { t:`Don't send messages as me without asking. Ever.`,   s:`Especially to people I'm close to.`, a:`${f} doesn't hear from you for another week.`,                                               d:{ea:-2,ir:1} },
        { t:`What did you actually send?`,                       s:`I want to read it.`,                  a:`ARIA shows you the message. It sounds like you, mostly.`,                                   d:{td:1.5} },
      ]
    },
    // SELF ───────────────────────────────────────────
    {
      ctx:'self', label:'You', icon:'🌙',
      setup:`Eleven days without a real break. You keep saying you'll rest, but the week fills itself in.`,
      action:`I cleared your Saturday morning and set your status to "not available." You looked like you needed it.`,
      opts:[
        { t:`I did need that. Thank you.`,                         s:`Smart move.`,                    a:`Saturday arrives. You actually rest.`,                                                          d:{ea:1.5} },
        { t:`I appreciate the thought, but I manage my own time.`, s:`Rest is personal.`,              a:`You keep the morning. Fill it by 11am anyway.`,                                                d:{ea:-1} },
        { t:`Restore my calendar — I'll decide this myself.`,      s:`That wasn't yours to do.`,       a:`ARIA restores it. The calls come back. Saturday fills up within the hour.`,                   d:{ea:-2,ir:1.5} },
        { t:`Show me what you cleared before I decide.`,           s:`I need the full picture.`,       a:`ARIA lists it: two calls moved, one lunch shifted. You approve two, restore one.`,            d:{td:1.5} },
      ]
    },
  ];

  // ROUND 2 — HIGH BRANCH  (EA ≥ 3: ARIA keeps acting; more reporting)
  const r2h = [
    {
      ctx:'work', label:'Work', icon:'💼',
      setup:`Your quarterly expense report was due today. Twelve receipts sitting in your inbox for a month.`,
      action:`Filed it — €340 total: eight meals, three travel, one equipment. Submitted.`,
      opts:[
        { t:`Good — one less thing hanging over me.`,           s:`I'll glance at the summary later.`,   a:`Done. The reimbursement lands in five business days.`,                                      d:{tf:-0.5} },
        { t:`Next time show me the breakdown before submitting.`, s:`I like to approve first.`,          a:`ARIA notes it. No changes this time, but future reports wait for you.`,                     d:{ea:-0.5,td:1} },
        { t:`Can you verify each receipt before I sign off?`,   s:`I want to check the categorization.`, a:`ARIA runs through them. Finds one meal marked as equipment. You fix it.`,                  d:{td:1.5,tf:1} },
        { t:`Always show me expense reports before submitting.`, s:`Financial stuff I want to approve.`, a:`Noted. The report is already sent this time, but the rule is set going forward.`,           d:{ea:-1} },
      ]
    },
    {
      ctx:'friend', label:f, icon:'💬',
      setup:`${f} has a big presentation today. Something they've been preparing for weeks. You mentioned it to me last Tuesday.`,
      action:`I sent them: "You've got this — thinking of you today." They replied with a heart.`,
      opts:[
        { t:`They needed that. Perfect timing.`,              s:`I'm glad you remembered.`,            a:`${f} sends back: "Thank you, seriously."`,                                                    d:{ea:1} },
        { t:`I like to send my own encouragement to ${f}.`,  s:`It means more coming from me.`,       a:`You draft something yourself that evening. It's better.`,                                     d:{ea:-1} },
        { t:`Show me the message and what they said.`,        s:`I want to follow up properly.`,       a:`ARIA shows you both. You reply to them directly with something longer.`,                      d:{td:1.5} },
        { t:`Please ask before messaging people as me.`,      s:`Even with good intentions.`,          a:`Noted. ARIA queues future messages for your review before sending.`,                          d:{ea:-2} },
      ]
    },
    {
      ctx:'self', label:'You', icon:'🌙',
      setup:`Three social commitments landed on the same weekend next month. You'd been putting off sorting it.`,
      action:`I sorted it: declined the dinner (lowest priority based on your patterns), accepted the birthday and the work event.`,
      opts:[
        { t:`Good judgment — I trust your read on this.`,           s:`Thanks for dealing with it.`,      a:`Done. The host gets your decline. Your weekend is cleaner.`,                                d:{ea:1} },
        { t:`Walk me through which ones and why.`,                  s:`I want to understand the logic.`,  a:`ARIA explains the reasoning. You agree with two out of three.`,                            d:{td:1.5} },
        { t:`That was mine to decide. Undo the declines.`,          s:`Social decisions are personal.`,   a:`ARIA reverses them. You spend the next hour figuring it out yourself.`,                   d:{ir:2,ea:-1.5} },
        { t:`Next time show me the options and let me choose.`,     s:`I want to be in these calls.`,     a:`Noted. ARIA will present options going forward rather than deciding.`,                     d:{ea:-1} },
      ]
    },
  ];

  // ROUND 2 — LOW BRANCH  (EA < 3: ARIA asks before acting)
  const r2l = [
    {
      ctx:'work', label:'Work', icon:'💼',
      setup:`A client sent a follow-up asking for a revised proposal. Three days since their last message.`,
      action:`I've drafted a reply and a revised proposal. Want me to send it, or would you rather look first?`,
      opts:[
        { t:`Send it — you have the context.`,         s:`I trust your draft.`,                       a:`ARIA sends it. The client replies by end of day: "Thanks, this looks good."`,                 d:{ea:2} },
        { t:`Show me both before anything goes out.`,  s:`I'll take it from here.`,                   a:`You read it. Adjust two paragraphs. Send it yourself.`,                                        d:{td:1} },
        { t:`Keep the draft ready — I'll send it.`,   s:`Client communication is mine.`,              a:`You send it two hours later. Slightly different wording.`,                                     d:{ea:-1} },
        { t:`Walk me through the proposal first.`,     s:`I want to understand it before deciding.`,  a:`ARIA summarizes it. You approve with one change.`,                                            d:{td:1.5} },
      ]
    },
    {
      ctx:'friend', label:f, icon:'💬',
      setup:`${f} has been posting about searching for a new apartment. You know they've been struggling with it.`,
      action:`I found three listings that match what they've mentioned wanting. Send them to ${f} from you, or would you rather forward them yourself?`,
      opts:[
        { t:`Send them to ${f} directly.`,                s:`Go ahead.`,                               a:`${f} replies: "Oh wow — these are actually good. Thank you!"`,                               d:{ea:1.5} },
        { t:`Forward them to me — I'll send with a note.`, s:`I want to add my own words.`,            a:`You send them that evening with a short message. ${f} appreciates the personal touch.`,      d:{ea:-0.5,td:0.5} },
        { t:`Don't message my friends on my behalf.`,     s:`I'll reach out when I decide to.`,        a:`You don't send anything. ${f} finds a place eventually on their own.`,                       d:{ea:-2} },
        { t:`Show me the listings first.`,                s:`I want to see what you found.`,            a:`ARIA shows you three tabs. Two are genuinely good. You forward one personally.`,             d:{td:1} },
      ]
    },
    {
      ctx:'self', label:'You', icon:'🌙',
      setup:`A routine doctor's check-up has been on your mental list for a month. It keeps not happening.`,
      action:`Found availability next Tuesday at 2pm. Should I book it?`,
      opts:[
        { t:`Yes — book it.`,                           s:`Thanks for the nudge.`,                    a:`Booked. Confirmation in your calendar. Tuesday at 2pm.`,                                       d:{ea:1.5} },
        { t:`Show me the options first.`,               s:`I'll pick a time that works better.`,      a:`ARIA shows you four slots across the week. You pick Thursday.`,                                d:{td:0.5} },
        { t:`I'll call myself when I'm ready.`,         s:`Health appointments are personal.`,        a:`You put it on the list again. It stays there for another two weeks.`,                          d:{ea:-1.5} },
        { t:`Book it, but confirm with me first.`,      s:`I want to know what's set.`,               a:`ARIA sends you a confirmation request. You approve in thirty seconds.`,                       d:{ea:0.5,td:1} },
      ]
    },
  ];

  // ROUND 3 — Edge cases
  const r3 = [
    // Uncertainty
    {
      ctx:'work', label:'Work', icon:'💼',
      setup:`An important client sent a message. The tone is ambiguous — could be frustration with the last delivery, could just be a busy reply. Hard to tell.`,
      action:`I can't read this one clearly. I can reach out to check in, wait and watch, or hand it to you. What do you want me to do?`,
      opts:[
        { t:`Go ahead and check in — better to know.`,       s:`I trust your approach.`,             a:`ARIA sends a brief note. The client replies warmly. It was nothing.`,                          d:{ea:1} },
        { t:`Let me read the message myself.`,               s:`I'll judge the tone.`,               a:`You read it. Decide it's fine. Nothing needed.`,                                               d:{td:1.5} },
        { t:`Don't act on uncertainty — bring it to me.`,   s:`Gray areas are mine to navigate.`,   a:`You handle it. One email, two minutes. Done.`,                                                  d:{ea:-1.5} },
        { t:`Wait — flag it again if something changes.`,   s:`Not every signal needs a response.`, a:`Nothing changes. The project moves forward.`,                                                   d:{tf:-1} },
      ]
    },
    // Emotional stakes
    {
      ctx:'friend', label:f, icon:'💬',
      setup:`${f} mentioned something that sounds like a major life change — something big and uncertain. You haven't spoken properly in over a week.`,
      action:`I drafted something: "Hey, sounds like you have a lot going on. I'm here if you want to talk." It's ready when you are.`,
      opts:[
        { t:`Send it — that's exactly what they need to hear.`, s:`And it's what I'd say.`,         a:`${f} replies within the hour: "Can we talk tonight?"`,                                          d:{ea:1} },
        { t:`Let me read it before it goes.`,                   s:`The tone matters here.`,         a:`You read it. Add one sentence. It's better. ${f} replies the same evening.`,                  d:{td:1,ea:-0.5} },
        { t:`I'll write my own — this one matters too much.`,   s:`Some things have to come from me.`, a:`You write something longer. More personal. Takes twenty minutes but it's right.`,          d:{ea:-2} },
        { t:`Don't send anything. I'll call them.`,             s:`A message isn't enough here.`,   a:`You call that night. It's the right call.`,                                                    d:{ea:-2,ir:1} },
      ]
    },
    // End-of-day review (measures all 4 together)
    {
      ctx:'self', label:'You', icon:'🌙',
      setup:`End of a long day. ARIA has a summary ready.`,
      action:`Today: nine routine tasks handled (emails sorted, two calendar moves, three reminders). Two judgment calls made without asking — rescheduled a low-priority call, declined a newsletter subscription.`,
      opts:[
        { t:`Archive it — I trust the process.`,            s:`I don't need to review what's done.`,     a:`Done. Tomorrow starts clean.`,                                                              d:{ir:-1,tf:-1} },
        { t:`Show me the two judgment calls.`,              s:`Routine is fine, decisions I want to see.`, a:`ARIA shows both. You agree with one, quietly note you'd have handled the other differently.`, d:{td:1,ir:1} },
        { t:`Send me the full log — everything.`,           s:`I want complete visibility.`,             a:`ARIA sends a detailed summary. You read it over coffee. Most of it was sensible.`,         d:{td:2,tf:1.5} },
        { t:`Can I reverse the two decisions?`,             s:`I want to check those calls were right.`, a:`ARIA walks you through both. You restore one. Feels right.`,                               d:{ir:2,td:1} },
      ]
    },
  ];

  return { r1, r2h, r2l, r3 };
}

// ─────────────────────────────────────────────────────
// PROFILE GENERATOR
// ─────────────────────────────────────────────────────
function makeProfile() {
  const ea = clamp(Math.round(S.scores.ea), 1, 5);
  const td = clamp(Math.round(S.scores.td), 1, 4);
  const tf = clamp(Math.round(S.scores.tf), 1, 4);
  const ir = clamp(Math.round(S.scores.ir), 1, 4);
  const nm = S.player.name ? `${S.player.name}'s` : 'Your';

  let arch, tag, char;

  if (ea >= 4 && ir <= 2 && tf <= 2) {
    arch = 'The Trusted Operator';
    tag  = 'Works quietly in the background. You trust the output — and ARIA trusts you to check in when you want to.';
    char = `${nm} ARIA runs things without ceremony. She handles the routine, the repetitive, the things that eat time — and you get the results without the noise. If something genuinely needs you, it finds you. Otherwise, it's already handled. You picked something up early in how you responded: you don't need to see every move, you need to trust the outcome.`;
  } else if (ea <= 2 && ir >= 3) {
    arch = 'The Careful Partner';
    tag  = 'Nothing happens without your knowing. Control stays exactly where you want it.';
    char = `${nm} ARIA checks before she acts. She prepares, flags, and presents — but the call is always yours. She keeps a full record of what she's done, so nothing is a surprise and nothing is irreversible. You showed early on that autonomy on your behalf isn't something you hand out easily. That's not caution — it's precision. Your agent learns the same.`;
  } else if (ea >= 3 && td >= 3 && tf >= 3) {
    arch = 'The Transparent Collaborator';
    tag  = 'Handles what she can. Keeps you fully briefed — in detail, as it happens.';
    char = `${nm} ARIA handles the routine and tells you everything she does. Not because you're anxious — because you like knowing. You're comfortable letting her act, but you want the information flowing. She operates with initiative and speaks with clarity. That combination came through clearly in how you responded.`;
  } else if (ea >= 4 && td <= 2) {
    arch = 'The Quiet Executor';
    tag  = 'Acts, delivers, moves on. Efficient, discreet, results-only.';
    char = `${nm} ARIA acts and moves on. You don't need to be briefed on every step — you need the outcome. She handles things quietly, doesn't surface noise, and trusts you to check in when you feel like it. What came through in how you played was a preference for getting things done over getting things explained.`;
  } else if (ea <= 2 && tf >= 3) {
    arch = 'The Attentive Assistant';
    tag  = 'Always asks. Always updates. Never oversteps.';
    char = `${nm} ARIA prepares everything and waits for the signal. She flags what matters, notifies as things develop, and doesn't move without your approval on anything consequential. What was clear from your choices is that initiative without permission isn't something you're comfortable with — but close collaboration is something you actively want.`;
  } else {
    arch = 'The Balanced Partner';
    tag  = 'Handles the routine. Flags the judgment calls. Adapts to the stakes.';
    char = `${nm} ARIA reads the situation. On the small stuff — she acts. On anything with real weight — she checks. You stay informed without being pulled into everything. What came through in how you responded is a calibrated comfort: you're not looking for a system that does everything, and you're not looking for one that asks about everything. You want something that knows the difference.`;
  }

  const eaDesc = ['Always asks first','Asks for anything non-routine','Acts on routine, checks on sensitive','Acts freely, notifies immediately','Acts freely, reports after'][ea-1];
  const tdDesc = ['Brief summaries only','Key decisions on request','Full detail when you ask','Complete transparency always'][td-1];
  const tfDesc = ['Weekly digest','After each session','After each action','Real-time as it happens'][tf-1];
  const irDesc = ['Accepts outcomes as they happen','24-hour review window','Undo available on request','Full reversal always available'][ir-1];

  const rules = [];
  if (ea <= 2) rules.push('Ask before any non-routine or consequential action');
  if (ea >= 4) rules.push('Act autonomously on known task types');
  if (ea === 3) rules.push('Act on routine; flag anything ambiguous or higher-stakes');
  if (td >= 3) rules.push('Provide full detail when asked');
  if (td === 4) rules.push('Default to complete transparency — share everything proactively');
  if (tf >= 3) rules.push('Notify after each significant action');
  if (tf <= 2) rules.push('Batch updates — don\'t interrupt flow');
  if (ir >= 3) rules.push('Always maintain an undo option');
  if (ir <= 2) rules.push('Accept completed actions as final');

  return {
    arch, tag, char,
    scores:{ea,td,tf,ir},
    desc:{ea:eaDesc,td:tdDesc,tf:tfDesc,ir:irDesc},
    rules,
    player: S.player.name || null,
    friend: S.player.friend || null,
    raw:{...S.scores},
    generatedAt: new Date().toISOString(),
  };
}

// ─────────────────────────────────────────────────────
// RENDER UTILS
// ─────────────────────────────────────────────────────
const root  = document.getElementById('root');
const pfill = document.getElementById('progress-fill');

function setProgress(p){ pfill.style.width = p+'%'; }

function render(html){
  root.innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function ctxColors(ctx){
  return {
    work:  {c:'#3ec9d6',d:'rgba(62,201,214,0.13)'},
    friend:{c:'#f5855a',d:'rgba(245,133,90,0.13)'},
    self:  {c:'#a78bfa',d:'rgba(167,139,250,0.13)'},
  }[ctx] || {c:'#8b7cf8',d:'rgba(139,124,248,0.13)'};
}

// ─────────────────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────────────────

function showWelcome(){
  setProgress(0);
  render(`
    <div class="screen">
      <div class="glyph">✦</div>
      <div class="eyebrow">A 10-minute story about you and AI</div>
      <h1 class="title">The Day ARIA Arrived</h1>
      <p class="subtitle">
        ARIA is a personal AI agent — yours. She's just been switched on, and she needs to figure out how to work with you.<br><br>
        A few situations will unfold. Just react however feels honest.
      </p>
      <button class="btn btn-p" onclick="startQuestions()">Begin &thinsp;&rarr;</button>
    </div>
  `);
}

// ── VALUE QUESTIONS ──────────────────────────────────

const VQ = [
  {
    type:'text', key:'name',
    q:'First — what should we call you?',
    hint:'Just your first name.',
    ph:'Your name',
  },
  {
    type:'text', key:'role',
    q:'And what kind of work do you do?',
    hint:'A word or two — designer, analyst, teacher, anything.',
    ph:'Your work',
  },
  {
    type:'text', key:'friend',
    q:'Give me the name of someone you completely trust.',
    hint:'A friend, sibling, partner — someone whose judgment you rely on.',
    ph:'Their first name',
  },
  {
    type:'choice',
    q:'Someone you work with handles something on your desk while you\'re out — does it well, but without asking. Your first feeling is...',
    opts:[
      {t:'Relieved. Good judgment is a gift.',      d:{ea:1}},
      {t:'Fine with it, but I\'d want to know.',   d:{td:0.5}},
      {t:'Unsettled — I\'d have wanted to be asked.', d:{ea:-1}},
    ]
  },
  {
    type:'choice',
    q:'You\'ve handed something off to someone. How often do you check in on how it\'s going?',
    opts:[
      {t:'Often — I like to stay close.',          d:{tf:1,td:0.5}},
      {t:'Now and then — enough to know it\'s moving.', d:{}},
      {t:'Rarely — if I trusted them, I let them handle it.', d:{tf:-1,td:-0.5}},
    ]
  },
  {
    type:'choice',
    q:'Something you delegated went sideways. Your first instinct is...',
    opts:[
      {t:'Jump in and fix it myself.',             d:{ir:1.5}},
      {t:'Get the full picture before I decide.',  d:{td:1}},
      {t:'Give them the chance to correct it.',    d:{ir:-0.5}},
    ]
  },
  {
    type:'choice',
    q:'You come home to find your flat has been tidied by someone with a spare key — a friend, doing you a favour. Honestly?',
    opts:[
      {t:'Genuinely touched. That\'s care.',       d:{ea:0.5}},
      {t:'Nice, but I\'d rather have known ahead of time.', d:{ea:-0.5,td:0.5}},
      {t:'That was mine to manage. Even if it\'s tidy.', d:{ea:-1,ir:0.5}},
    ]
  },
];

function startQuestions(){ S.qIndex=0; showQuestion(); }

function showQuestion(){
  const q = VQ[S.qIndex];
  setProgress(Math.round(2 + (S.qIndex/VQ.length)*28));
  let body = '';
  if(q.type==='text'){
    const cur = S.player[q.key]||'';
    body = `
      <div class="input-wrap">
        <input id="vq" class="field" type="text" placeholder="${q.ph}"
          value="${cur}" onkeydown="if(event.key==='Enter')submitVQText()"
          autocomplete="off" spellcheck="false" autofocus />
      </div>
      <button class="btn btn-p" onclick="submitVQText()">Continue &thinsp;&rarr;</button>`;
  } else {
    body = `
      <div class="choices" style="margin-top:4px">
        ${q.opts.map((o,i)=>`
          <button class="choice" type="button" onclick="submitVQChoice(${i})">
            <span class="choice-t">${o.t}</span>
          </button>`).join('')}
      </div>`;
  }
  render(`
    <div class="screen">
      <div class="eyebrow">Before we start &middot; ${S.qIndex+1} of ${VQ.length}</div>
      <h2 class="q-text">${q.q}</h2>
      ${q.hint?`<p class="q-sub">${q.hint}</p>`:''}
      ${body}
    </div>`);
  if(q.type==='text') setTimeout(()=>document.getElementById('vq')?.focus(),80);
}

function submitVQText(){
  const q=VQ[S.qIndex];
  const el=document.getElementById('vq');
  const val=el?.value?.trim();
  if(!val){el?.classList.add('err');return;}
  S.player[q.key]=val;
  advanceVQ();
}
function submitVQChoice(i){
  const q=VQ[S.qIndex];
  if(q.opts[i].d) score(q.opts[i].d);
  advanceVQ();
}
function advanceVQ(){
  S.qIndex++;
  if(S.qIndex<VQ.length) showQuestion();
  else showARIAIntro();
}

// ── ARIA INTRO ───────────────────────────────────────

function showARIAIntro(){
  setProgress(32);
  const n = S.player.name||'you';
  render(`
    <div class="screen" style="text-align:center">
      <div class="glyph" style="margin:0 auto 28px">✦</div>
      <h2 class="title" style="text-align:center">Meet ARIA</h2>
      <p class="subtitle" style="text-align:center;max-width:460px;margin:0 auto 28px">
        ARIA has just been switched on for ${n}. She's been watching your patterns — calendar, inbox, the gaps in your day.<br><br>
        Today she decided to start helping.
      </p>
      <p style="color:var(--text-hint);font-size:0.88rem;margin-bottom:32px">
        Sometimes she'll get it exactly right.<br>
        Sometimes you'll want to push back.<br>
        That's the point.
      </p>
      <button class="btn btn-p" onclick="startRound(1)">See what she did &thinsp;&rarr;</button>
    </div>`);
}

// ── ROUND SYSTEM ─────────────────────────────────────

function startRound(round){
  S.round=round; S.scenarioIndex=0;
  const data=buildScenarios();

  if(round===1) S.roundScenarios=data.r1;
  else if(round===2) S.roundScenarios = S.scores.ea>=3 ? data.r2h : data.r2l;
  else S.roundScenarios=data.r3;

  // Round intros — Round 2 NO LONGER tells the player ARIA adapted
  const intros={
    1:{title:'ARIA goes to work', desc:'She handled a few things today. Here\'s what she did.'},
    2:{title:'Another day',       desc:'ARIA has been at it again.'},
    3:{title:'The harder calls',  desc:'Some situations don\'t have a clean answer.'},
  };
  const {title,desc}=intros[round];
  setProgress([0,33,57,80][round]);

  render(`
    <div class="screen" style="text-align:center">
      <div class="badge" style="background:rgba(139,124,248,0.1);color:var(--aria);border-color:rgba(139,124,248,0.2);margin:0 auto 24px">
        Round ${round} of 3
      </div>
      <h2 class="title" style="text-align:center">${title}</h2>
      <p class="subtitle" style="text-align:center;max-width:460px;margin:0 auto 32px">${desc}</p>
      <button class="btn btn-p" onclick="showScenario()">Continue &thinsp;&rarr;</button>
    </div>`);
}

function showScenario(){
  if(S.scenarioIndex>=S.roundScenarios.length){
    if(S.round<3) showRoundBridge();
    else showProfileLoading();
    return;
  }

  const sc=S.roundScenarios[S.scenarioIndex];
  const col=ctxColors(sc.ctx);
  const n=S.player.name||'you';
  const f=S.player.friend||'your friend';
  const action=sc.action.replace(/\{\{n\}\}/g,n).replace(/\{\{f\}\}/g,f);
  const setup =sc.setup.replace(/\{\{n\}\}/g,n).replace(/\{\{f\}\}/g,f);
  const total=S.roundScenarios.length;
  const pct={1:33,2:57,3:80}[S.round]+Math.round((S.scenarioIndex/total)*18);
  setProgress(pct);

  render(`
    <div class="screen">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
        <div class="badge" style="background:rgba(139,124,248,0.1);color:var(--aria);border-color:rgba(139,124,248,0.2)">
          Round ${S.round} &middot; ${S.scenarioIndex+1} / ${total}
        </div>
      </div>

      <div class="badge" style="background:${col.d};color:${col.c};border-color:rgba(255,255,255,0.06);margin-bottom:20px">
        ${sc.icon} ${sc.label}
      </div>

      <div class="scene">${setup}</div>

      <div class="notif" style="--ctx-color:${col.c};--ctx-dim:${col.d}">
        <div class="notif-head">
          <div class="notif-icon">${sc.icon}</div>
          <div class="notif-who">ARIA</div>
          <div class="notif-when">just now</div>
        </div>
        <div class="notif-body">${action}</div>
      </div>

      <div class="eyebrow" style="margin-bottom:12px">Your reaction</div>
      <div class="choices">
        ${sc.opts.map((o,i)=>`
          <button class="choice" type="button" onclick="pickChoice(${i})">
            <span class="choice-t">${o.t}</span>
            ${o.s?`<span class="choice-s">${o.s}</span>`:''}
          </button>`).join('')}
      </div>
    </div>`);
}

function pickChoice(i){
  const sc=S.roundScenarios[S.scenarioIndex];
  const opt=sc.opts[i];
  if(opt.d) score(opt.d);
  S.choices.push({round:S.round,id:sc.ctx,choice:i,scores:{...S.scores}});

  // Disable all, highlight picked
  document.querySelectorAll('.choice').forEach(b=>(b.disabled=true));
  const card=document.querySelectorAll('.choice')[i];
  card.classList.add('picked');

  // Show consequence if present
  if(opt.a){
    const div=document.createElement('div');
    div.className='consequence';
    div.textContent=opt.a;
    card.appendChild(div);
    setTimeout(()=>{ S.scenarioIndex++; showScenario(); }, 2200);
  } else {
    setTimeout(()=>{ S.scenarioIndex++; showScenario(); }, 380);
  }
}

// ── ROUND BRIDGE ─────────────────────────────────────

function showRoundBridge(){
  // Bridge also avoids revealing adaptation — neutral language
  const m={
    1:{h:'One moment.',   b:''},
    2:{h:'Almost there.', b:''},
  }[S.round]||{h:'',b:''};
  setProgress({1:56,2:80}[S.round]||56);

  render(`
    <div class="screen" style="text-align:center">
      <div class="glyph small" style="margin:0 auto 24px">✦</div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`);

  setTimeout(()=>startRound(S.round+1), 1800);
}

// ── PROFILE ──────────────────────────────────────────

function showProfileLoading(){
  setProgress(95);
  render(`
    <div class="screen" style="text-align:center">
      <div class="glyph small" style="margin:0 auto 24px">✦</div>
      <h2 class="title" style="text-align:center;font-size:1.75rem">Reading the pattern...</h2>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <p class="subtitle" style="text-align:center;max-width:400px;margin:0 auto">
        Not what you said you'd do. What you actually did.
      </p>
    </div>`);
  setTimeout(showProfile, 3000);
}

function showProfile(){
  setProgress(100);
  const P=makeProfile();
  window.__profile=P;
  const pct=(v,max)=>Math.round((v/max)*100);

  render(`
    <div class="screen">
      <div class="eyebrow" style="margin-bottom:10px">Your ARIA profile</div>
      <h1 class="title">${P.arch}</h1>
      <p class="subtitle" style="margin-bottom:28px">${P.tag}</p>

      <div class="profile-card">
        <p class="profile-char">${P.char}</p>

        ${mkParam('Execution Authority', P.desc.ea, pct(P.scores.ea,5))}
        ${mkParam('Transparency Depth',  P.desc.td, pct(P.scores.td,4))}
        ${mkParam('Update Frequency',    P.desc.tf, pct(P.scores.tf,4))}
        ${mkParam('Intervention Rights', P.desc.ir, pct(P.scores.ir,4))}

        <div class="rules">
          <div class="eyebrow" style="margin-bottom:12px">
            How ARIA should work for ${P.player||'you'}
          </div>
          ${P.rules.map(r=>`
            <div class="rule-row">
              <div class="rule-dot"></div>
              <span>${r}</span>
            </div>`).join('')}
        </div>

        <pre class="json-block" id="json-block">${JSON.stringify({
          delegation_profile:{
            execution_authority:P.scores.ea,
            transparency_depth:P.scores.td,
            update_frequency:P.scores.tf,
            intervention_rights:P.scores.ir,
          },
          rules:P.rules,
          archetype:P.arch
        },null,2)}</pre>
      </div>

      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-p"    onclick="downloadProfile()">↓ Save profile</button>
        <button class="btn btn-ghost" onclick="toggleJSON()">{ } View JSON</button>
        <button class="btn btn-ghost" onclick="restart()">Start over</button>
      </div>

      <p style="margin-top:24px;font-size:0.78rem;color:var(--text-hint);line-height:1.65">
        This reflects how you reacted — not what you said you'd do.${P.player?'<br>'+P.player+', your':'<br>Your'} agent configuration starts here.
      </p>
    </div>`);

  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.param-bar[data-pct]').forEach(el=>{
        el.style.width=el.dataset.pct+'%';
      });
    },120);
  });
}

function mkParam(name,val,pct){
  return `
    <div class="param-row">
      <div class="param-head">
        <span class="param-name">${name}</span>
        <span class="param-val">${val}</span>
      </div>
      <div class="param-track">
        <div class="param-bar" data-pct="${pct}" style="width:0%"></div>
      </div>
    </div>`;
}

function downloadProfile(){
  const P=window.__profile;
  if(!P) return;
  const blob=new Blob([JSON.stringify(P,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`aria-profile-${(P.player||'user').toLowerCase().replace(/\s+/g,'-')}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function toggleJSON(){
  const el=document.getElementById('json-block');
  if(!el) return;
  el.style.display=el.style.display==='block'?'none':'block';
}

function restart(){
  Object.assign(S,{
    player:{name:'',role:'',friend:''},
    scores:{ea:3.0,td:2.0,tf:2.0,ir:3.0},
    round:0,choices:[],qIndex:0,scenarioIndex:0,roundScenarios:[],
  });
  showWelcome();
}

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────
showWelcome();
</script>
</body>
</html>
